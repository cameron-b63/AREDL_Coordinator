name: Enforce HTTPS

on:
  workflow_dispatch:

jobs:
  enforce-https:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Cloudflare HTTPS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/enforce-https-cloudflare.sh

      - name: Verify Cloudflare edge redirect
        run: |
          sleep 15
          curl -sI "http://${{ vars.CUSTOM_DOMAIN || 'nshbeatsthearedl.christmas' }}" | head -5
          curl -sI "https://${{ vars.CUSTOM_DOMAIN || 'nshbeatsthearedl.christmas' }}" | head -5

      - name: Provision GitHub Pages cert and enforce HTTPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/enforce-https-github.sh

      - name: Upgrade Cloudflare SSL to Full (strict)
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true
        run: |
          DOMAIN="nshbeatsthearedl.christmas"
          ZONE_ID="$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")"
          RESPONSE="$(curl -sS -X PATCH "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/settings/ssl" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"value":"strict"}')"
          echo "$RESPONSE" | python3 -m json.tool
          echo "$RESPONSE" | python3 -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('success') else 1)"

      - name: Final verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sI http://nshbeatsthearedl.christmas | head -3
          curl -sI https://nshbeatsthearedl.christmas | head -3
          gh api "repos/${{ github.repository }}/pages" | python3 -m json.tool
          gh api "repos/${{ github.repository }}/pages/health" | python3 -m json.tool
