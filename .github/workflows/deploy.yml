name: Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # First push to a branch can have an all-zero "before" SHA.
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            RANGE="$AFTER"
          else
            RANGE="$BEFORE...$AFTER"
          fi

          CHANGED_FILES="$(git diff --name-only "$RANGE")"

          backend_changed=false
          frontend_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              backend/*|.github/workflows/deploy.yml|Makefile)
                backend_changed=true
                ;;
            esac

            case "$file" in
              frontend/*|.github/workflows/deploy.yml|Makefile)
                frontend_changed=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "backend=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend_changed" >> "$GITHUB_OUTPUT"

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: release-wasm32

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Check migration safety
        run: bash scripts/check-migrations.sh

      - uses: actions/cache@v4
        id: worker-build-cache
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-0.8.3-${{ runner.os }}

      - if: steps.worker-build-cache.outputs.cache-hit != 'true'
        run: cargo install worker-build --locked --version 0.8.3

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: d1 migrations apply DB --remote -c wrangler.toml

      # Deploy first, then sync secrets. Uploading secrets before deploy fails with
      # Cloudflare error 10215 when Worker versions are enabled (latest version not deployed).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy -c wrangler.toml

      - name: Sync Worker secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: whoami
          secrets: |
            DISCORD_CLIENT_ID
            DISCORD_CLIENT_SECRET
            DISCORD_BOT_TOKEN
            JWT_SECRET
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend/backend auth config drift
        shell: bash
        run: |
          set -euo pipefail

          api_url="$(rg '^VITE_API_URL=' .env.production | sed 's/^VITE_API_URL=//')"
          frontend_origin="$(rg '^FRONTEND_ORIGIN = ' ../backend/wrangler.toml | sed 's/^FRONTEND_ORIGIN = \"//; s/\"$//')"
          frontend_base_path="$(rg '^FRONTEND_BASE_PATH = ' ../backend/wrangler.toml | sed 's/^FRONTEND_BASE_PATH = \"//; s/\"$//')"

          if [[ -z "$api_url" || -z "$frontend_origin" || -z "$frontend_base_path" ]]; then
            echo "Missing VITE_API_URL or backend frontend origin/base path configuration."
            exit 1
          fi

          if [[ "$api_url" != https://* ]]; then
            echo "VITE_API_URL must be https in production. Got: $api_url"
            exit 1
          fi

          if [[ "$frontend_origin" != https://* ]]; then
            echo "FRONTEND_ORIGIN must be https. Got: $frontend_origin"
            exit 1
          fi

          if [[ "$frontend_base_path" != /* ]]; then
            echo "FRONTEND_BASE_PATH must start with '/'. Got: $frontend_base_path"
            exit 1
          fi

      - run: npm ci && npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
