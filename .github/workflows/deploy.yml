name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: release-wasm32

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Check migration safety
        run: bash scripts/check-migrations.sh

      - uses: actions/cache@v4
        id: worker-build-cache
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-0.8.3-${{ runner.os }}

      - if: steps.worker-build-cache.outputs.cache-hit != 'true'
        run: cargo install worker-build --locked --version 0.8.3

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: d1 migrations apply DB --remote -c wrangler.toml

      # Deploy first, then sync secrets. Uploading secrets before deploy fails with
      # Cloudflare error 10215 when Worker versions are enabled (latest version not deployed).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy -c wrangler.toml

      - name: Sync Worker secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: whoami
          secrets: |
            DISCORD_CLIENT_ID
            DISCORD_CLIENT_SECRET
            DISCORD_BOT_TOKEN
            JWT_SECRET
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci && npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          cname: nshbeatsthearedl.christmas

      - name: Enforce HTTPS on GitHub Pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -F https_enforced=true \
            -f cname=nshbeatsthearedl.christmas \
            -f build_type=legacy
